apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../ssh/base
patches:
  - target:
      kind: Deployment
      name: dsw-ancestry-ssh
    patch: |
      - op: replace
        path: /metadata/name
        value: dsw-ancestry-ssh-cuda
      - op: replace
        path: /spec/selector/matchLabels/app
        value: dsw-ancestry-ssh-cuda
      - op: replace
        path: /spec/template/metadata/labels/app
        value: dsw-ancestry-ssh-cuda
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: julianbht/ancestry-pipeline:ssh-cuda
