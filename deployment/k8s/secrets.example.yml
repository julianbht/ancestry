# Copy this file to secrets.yml, fill in real values, and apply once:
#   kubectl apply -f deployment/k8s/secrets.yml
# Do NOT commit secrets.yml — it is gitignored.
#
# SSH key secret is created separately (not tracked here):
# kubectl create secret generic ssh-key-secret \
#   --from-file=authorized_keys=$HOME/.ssh/id_rsa_cluster.pub \
#   --from-file=ancestry_deploy_key=$HOME/.ssh/ancestry_deploy_key \
#   --from-file=config=$HOME/.ssh/ancestry_cluster_config \
#   --dry-run=client -o yaml | kubectl apply -f -
#
# ancestry_deploy_key: read-only GitHub deploy key for git pull inside the pod
# ancestry_cluster_config: SSH config routing github.com to use the deploy key
apiVersion: v1
kind: Secret
metadata:
  name: dsw-ancestry-secrets
type: Opaque
stringData:
  NEXTCLOUD_PASSWORD: "your-password-here"
  ZIP_PASSWORD: "your-password-here"
  GITHUB_TOKEN: "your-github-pat-here"
  HF_TOKEN: "your-hf-token-here"
  ANTHROPIC_API_KEY: "your-anthropic-api-key-here"
  WANDB_API_KEY: "your-wandb-api-key-here"
  # Git commit identity for the SSH dev box. The entrypoint writes these into
  # /root/.gitconfig so commits made over SSH are attributed to you (env vars
  # don't reach SSH login shells, but the .gitconfig file does). Required — the
  # ssh Deployment references both keys and the entrypoint aborts if either is unset.
  GIT_USER_NAME: "Your Name"
  GIT_USER_EMAIL: "you@example.com"
  # R2 backup/sync credentials for scripts/sync_private.py. Stored as ONE
  # dotenv-format blob (not individual secretKeyRef keys) so the ssh Deployment
  # can mount it as a file at /app/.env, which load_dotenv() reads. That file
  # route is deliberate: sshd does NOT pass secretKeyRef env vars to the login
  # shells you SSH into (see the deployment-env skill), so an interactive
  # `uv run python scripts/sync_private.py pull` would not otherwise see them.
  # The mount is a tmpfs secret volume — never written to the PVC. Keys match
  # r2.py's load_settings() / .env.example.
  R2_DOTENV: |
    R2_ACCOUNT_ID=your-account-id
    R2_ACCESS_KEY_ID=your-access-key-id
    R2_SECRET_ACCESS_KEY=your-secret-access-key
    R2_BUCKET=your-bucket-name
    R2_PASSPHRASE=your-encryption-passphrase
#
# Docker Hub credentials for Kaniko image builds — created separately (different secret type):
# kubectl create secret docker-registry dockerhub-creds \
#   --docker-username=<your-dockerhub-username> \
#   --docker-password=<your-dockerhub-pat> \
#   --docker-server=https://index.docker.io/v1/
